services:
  - type: web
    name: myokee-api
    runtime: node
    buildCommand: npm install -g pnpm@9 && pnpm install --config.strict-dep-builds=false && pnpm --filter @workspace/karaoke-app run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
