kind = "mobile"
previewPath = "/mobile/"
title = "VocalShift Mobile"
version = "1.0.0"
id = "artifacts/karaoke-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 22425
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/karaoke-mobile run dev"

[services.env]
PORT = "22425"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/karaoke-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/karaoke-mobile", "run", "serve"]
