kind = "web"
previewPath = "/"
title = "Karaoke AI"
version = "1.0.0"
id = "artifacts/karaoke-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19131
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/karaoke-app run dev"

[services.env]
PORT = "19131"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/karaoke-app", "run", "build"]
publicDir = "artifacts/karaoke-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
