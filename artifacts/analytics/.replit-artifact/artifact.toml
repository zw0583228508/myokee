kind = "web"
previewPath = "/analytics/"
title = "MYOUKEE Analytics"
version = "1.0.0"
id = "artifacts/analytics"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
localPort = 19193
name = "web"
paths = ["/analytics/"]

[services.development]
run = "pnpm --filter @workspace/analytics run dev"

[services.env]
PORT = "19193"
BASE_PATH = "/analytics/"

[services.production]
build = ["pnpm", "--filter", "@workspace/analytics", "run", "build"]
publicDir = "artifacts/analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
